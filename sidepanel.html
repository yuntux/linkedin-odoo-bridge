<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked Odoo Bridge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Settings View (Tabs) -->
        <section id="settings-view" class="view">
            <div class="tabs">
                <button class="tab-btn active" data-tab="session-tab" data-i18n="tabSession">Session</button>
                <button class="tab-btn" data-tab="password-tab" data-i18n="tabPassword">Password</button>
            </div>

            <div id="session-tab" class="tab-content">
                <p class="hint" data-i18n="sessionHint">Use your active browser session.</p>
                <div class="form-group">
                    <label data-i18n="odooUrl">Odoo URL</label>
                    <input type="text" id="session-url" placeholder="https://odoo.example.com">
                </div>
                <button id="sync-session" class="primary-btn" data-i18n="syncSession">Synchroniser avec le
                    navigateur</button>
            </div>

            <div id="password-tab" class="tab-content hidden">
                <div class="form-group">
                    <label data-i18n="odooUrl">Odoo URL</label>
                    <input type="text" id="manual-url" placeholder="https://odoo.example.com">
                </div>
                <div class="form-group">
                    <label data-i18n="odooDb">Database</label>
                    <input type="text" id="manual-db" placeholder="my_database">
                </div>
                <div class="form-group">
                    <label data-i18n="odooUser">Username</label>
                    <input type="text" id="manual-user" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label data-i18n="odooPass">API Key / Password</label>
                    <input type="password" id="manual-pass">
                </div>
                <button id="save-settings" class="primary-btn" data-i18n="saveSettings">Save Settings</button>
            </div>

            <div class="settings-footer">
                <button id="back-to-main" class="text-link hidden">← Retour au Scan</button>
            </div>
        </section>

        <!-- Main View -->
        <section id="main-view" class="view hidden">
            <div class="filters">
                <div class="filter-row">
                    <span class="filter-label" data-i18n="hideExists">Masquer les contacts déjà sur Odoo</span>
                    <label class="switch">
                        <input type="checkbox" id="hide-existing-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
            <div class="actions">
                <button id="scan-btn" class="primary-btn" data-i18n="scanBtn">Scan LinkedIn Page</button>
            </div>

            <div id="status-msg"></div>

            <div id="contacts-list" class="list-container">
                <div class="empty-state" data-i18n="noContacts">No contacts found yet.</div>
            </div>

            <div class="debug-section">
                <div class="debug-controls">
                    <button id="settings-toggle" class="icon-btn-small">⚙️</button>
                    <button id="toggle-debug" class="text-link" data-i18n="showDebug">Show Raw JSON Debug</button>
                </div>
                <pre id="debug-output" class="hidden"></pre>
            </div>
        </section>
    </div>
    <script src="sidepanel.js"></script>
</body>

</html>
